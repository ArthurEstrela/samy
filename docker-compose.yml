services:
  postgres:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: samy
      POSTGRES_PASSWORD: samy
      POSTGRES_DB: samy
    volumes:
      - samy_pg:/var/lib/postgresql/data
  postgres_test:
    image: postgres:16
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: samy
      POSTGRES_PASSWORD: samy
      POSTGRES_DB: samy_test
  redis:
    image: redis:7
    ports:
      - "6379:6379"
volumes:
  samy_pg:
